<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albino Life: High Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --acc: #8b5cf6; --text: #e2e8f0; --danger: #ef4444; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; border-right: 1px solid #222; position: relative; background: var(--bg); }
        
        .header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--acc); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-box { font-size: 10px; color: #888; text-transform: uppercase; }
        .bar { height: 6px; background: #222; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .fill { height: 100%; width: 100%; transition: width 0.3s ease; }

        #logs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 8px; font-size: 12px; }
        .log-item { padding: 10px; border-radius: 8px; background: #0f172a; border: 1px solid #1e293b; animation: fadeIn 0.2s; }
        .log-sinister { border-color: var(--danger); background: #2d0a0a; color: #fca5a5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .actions-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; background: var(--card); border-top: 1px solid #222; }
        .btn { padding: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.1s; }
        .btn:active { transform: scale(0.95); background: var(--acc); }
        .btn-age { grid-column: span 2; background: #fff; color: #000; font-size: 14px; margin-top: 5px; height: 50px; }

        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 30px; display: none; flex-direction: column; justify-content: center; }
        .option { padding: 15px; border: 1px solid #444; margin-top: 10px; border-radius: 8px; cursor: pointer; background: #0a0a0a; }
        .option:hover { border-color: var(--acc); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div style="display:flex; justify-content:space-between; font-weight:bold">
            <span id="ui-age">ANO: 0</span>
            <span id="ui-money" style="color:var(--success)">R$ 50</span>
        </div>
        <div class="stats-grid">
            <div class="stat-box">PELE <div class="bar"><div id="bar-skin" class="fill" style="background:#ef4444"></div></div></div>
            <div class="stat-box">QI <div class="bar"><div id="bar-qi" class="fill" style="background:#3b82f6; width:50%"></div></div></div>
            <div class="stat-box">FORÇA <div class="bar"><div id="bar-strength" class="fill" style="background:#a855f7; width:10%"></div></div></div>
        </div>
    </div>

    <div id="logs"></div>

    <div class="actions-menu">
        <button class="btn" onclick="openModal('jobs')">💼 CARREIRA</button>
        <button class="btn" onclick="openModal('training')">🏋️ TREINAR</button>
        <button class="btn" onclick="openModal('night')">🌃 NOITE</button>
        <button class="btn" onclick="buyProtection()">🧴 PROTETOR</button>
        <button class="btn btn-age" onclick="ageUp()">PRÓXIMO ANO</button>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title">Título</h2>
        <p id="modal-desc" style="margin-bottom:10px; font-size:14px; line-height:1.4"></p>
        <div id="modal-options"></div>
        <button class="btn" style="margin-top:20px" onclick="closeModal()">FECHAR</button>
    </div>
</div>

<script>
    // Estado do Jogo
    let p = {
        age: 0, money: 50, skin: 100, health: 100, qi: 50, strength: 10,
        happiness: 80, job: "Nenhum", dead: false
    };

    function updateUI() {
        document.getElementById('ui-age').innerText = `ANO: ${p.age}`;
        document.getElementById('ui-money').innerText = `R$ ${p.money}`;
        document.getElementById('bar-skin').style.width = p.skin + "%";
        document.getElementById('bar-qi').style.width = p.qi + "%";
        document.getElementById('bar-strength').style.width = p.strength + "%";
        
        if(p.dead) {
            document.querySelector('.btn-age').innerText = "MORREU";
            document.querySelector('.btn-age').disabled = true;
        }
    }

    function addLog(msg, sinister = false) {
        const logBox = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = `log-item ${sinister ? 'log-sinister' : ''}`;
        div.innerHTML = `<strong>[Ano ${p.age}]</strong> ${msg}`;
        logBox.appendChild(div);
    }

    function ageUp() {
        if(p.dead) return;
        p.age++;
        
        // Salário
        const salaries = { "Dev": 1500, "CEO": 9000, "Nenhum": 0 };
        p.money += salaries[p.job] || 0;
        
        // Desgaste Albinismo
        p.skin -= 8;
        p.happiness -= 5;

        if(Math.random() < 0.3) triggerSinisterEvent();
        
        if(p.skin <= 0) { p.dead = true; addLog("💀 O câncer de pele avançou agressivamente. Fim.", true); }
        updateUI();
    }

    function buyProtection() {
        if(p.money >= 150) {
            p.money -= 150;
            p.skin = 100;
            addLog("🧴 Você aplicou proteção total FPS 100.");
            updateUI();
        }
    }

    function triggerSinisterEvent() {
        const events = [
            { t: "ASSALTO", d: "Criminosos te cercaram. 'Passa o celular, branquelo!'", o: [
                { n: "Lutar (Força > 40)", act: () => p.strength > 40 ? addLog("Você deu uma surra neles!") : (p.health -= 50, p.money = 0, addLog("Você apanhou feio.", true)) },
                { n: "Entregar", act: () => { p.money = 0; addLog("Levaram tudo."); } }
            ]},
            { t: "DOPPELGANGER", d: "Você viu alguém idêntico a você, mas com olhos pretos, te encarando.", o: [
                { n: "Seguir", act: () => { p.happiness -= 20; addLog("Você o perdeu de vista e sentiu um calafrio.", true); } },
                { n: "Fugir", act: () => addLog("Você correu para casa.") }
            ]}
        ];
        const ev = events[Math.floor(Math.random() * events.length)];
        showModal(ev.t, ev.d, ev.o);
    }

    function openModal(type) {
        const m = {
            jobs: { t: "CARREIRA", d: "Escolha seu destino:", o: [
                { n: "Dev Jr (60 QI)", act: () => p.qi >= 60 ? p.job = "Dev" : alert("QI baixo!") },
                { n: "CEO (95 QI)", act: () => p.qi >= 95 ? p.job = "CEO" : alert("Burro demais!") }
            ]},
            training: { t: "TREINO", d: "O que quer aprimorar?", o: [
                { n: "Estudar (+QI)", act: () => { p.qi += 10; p.happiness -= 10; } },
                { n: "Lutar (+Força)", act: () => { p.strength += 10; p.skin -= 5; } }
            ]},
            night: { t: "NOITE", d: "O submundo te chama...", o: [
                { n: "Acompanhante (R$ 500)", act: () => p.money >= 500 ? (p.money -= 500, p.happiness += 40) : alert("Sem grana!") },
                { n: "Clube de Luta", act: () => { p.strength += 5; p.health -= 20; } }
            ]}
        };
        showModal(m[type].t, m[type].d, m[type].o);
    }

    function showModal(title, desc, options) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        const optCont = document.getElementById('modal-options');
        optCont.innerHTML = '';
        options.forEach(o => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = o.n;
            div.onclick = () => { o.act(); closeModal(); updateUI(); };
            optCont.appendChild(div);
        });
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // Início
    addLog("O sol nasce. Sua jornada começa.");
    updateUI();
</script>

</body>
</html>
</head>
<body>
    <div id="root">Cargando sistema...</div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [p, setP] = useState({

            });
            const [logs, setLogs] = useState([{ m: "Você nasceu. A luz dói, mas você está aqui.", s: false }]);
            const [view, setView] = useState(null);

            const addLog = (m, s = false) => setLogs(prev => [{ m, s }, ...prev]);

            const update = (obj) => {
                setP(prev => {
                    let next = { ...prev, ...obj };
                    ['skin', 'health', 'happiness', 'libido', 'qi', 'strength'].forEach(k => {
                        if(next[k] !== undefined) next[k] = Math.max(0, Math.min(100, next[k]));
                    });
                    return next;
                });
            };

            const ageUp = () => {
                if(p.dead) return;
                let newAge = p.age + 1;
                let salary = p.job === "Dev" ? 1200 : p.job === "Vendedor" ? 300 : p.job === "CEO" ? 8000 : 0;
                
                update({ age: newAge, money: p.money + salary, skin: p.skin - 7, happiness: p.happiness - 5 });
                
                if (Math.random() < 0.3) triggerSinisterEvent(newAge);
                if (p.skin <= 0 || p.health <= 0) { update({ dead: true }); addLog("💀 SEU CORPO CEDEU AO SOL E À EXAUSTÃO.", true); }
            };

            const triggerSinisterEvent = (age) => {
                const events = [
                    { t: "BECU ESCURO", d: "Três homens te cercaram. Eles querem seu dinheiro e seus órgãos.", o: [
                        { n: "Lutar (Requer Força > 30)", f: () => p.strength > 30 ? addLog("Você os quebrou no soco.") : update({health: -60, money: 0}) },
                        { n: "Correr desesperadamente", f: () => update({health: -20, happiness: -30}) }
                    ]},
                    { t: "OBSESSÃO", d: "Uma pessoa estranha te persegue há quadras dizendo que sua pele é mágica.", o: [
                        { n: "Chamar a polícia", f: () => addLog("A polícia ignorou seu chamado.") },
                        { n: "Confrontar", f: () => update({strength: 2, happiness: -10}) }
                    ]}
                ];
                setView({ type: 'event', data: events[Math.floor(Math.random()*events.length)] });
            };

            return (
                <div id="root">
                    <div className="header">
                        <div style={{display:'flex', justifyContent:'space-between', fontWeight:'bold'}}>
                            <span>ANO: {p.age}</span>
                            <span style={{color:'#10b981'}}>R$ {p.money}</span>
                        </div>
                        <div className="stats-grid">
                            <div className="stat-box">PELE <div className="bar"><div className="fill" style={{width:`${p.skin}%`, background:'#ef4444'}}></div></div></div>
                            <div className="stat-box">QI <div className="bar"><div className="fill" style={{width:`${p.qi}%`, background:'#3b82f6'}}></div></div></div>
                            <div className="stat-box">FORÇA <div className="bar"><div className="fill" style={{width:`${p.strength}%`, background:'#a855f7'}}></div></div></div>
                        </div>
                    </div>

                    <div className="logs">
                        {logs.map((l, i) => <div key={i} className={`log-item ${l.s ? 'log-sinister' : ''}`}>{l.m}</div>)}
                    </div>

                    <div className="actions-menu">
                        <button className="btn" onClick={() => setView({type:'jobs'})}>💼 CARREIRA</button>
                        <button className="btn" onClick={() => setView({type:'training'})}>🏋️ TREINAR</button>
                        <button className="btn" onClick={() => setView({type:'night'})}>🌃 NOITE</button>
                        <button className="btn" onClick={() => update({skin: 100, money: p.money - 150})}>🧴 PROTETOR</button>
                        <button className="btn btn-age" onClick={ageUp} disabled={p.dead}>PRÓXIMO ANO</button>
                    </div>

                    {view?.type === 'jobs' && (
                        <div className="modal">
                            <h2>CARREIRAS</h2>
                            <div className="option" onClick={() => { if(p.qi > 60) { update({job: "Dev"}); setView(null); } else alert("QI baixo!"); }}>Dev Júnior (60 QI)</div>
                            <div className="option" onClick={() => { if(p.qi > 95) { update({job: "CEO"}); setView(null); } else alert("QI insuficiente!"); }}>CEO Tech (95 QI)</div>
                            <div className="option" onClick={() => setView(null)}>FECHAR</div>
                        </div>
                    )}

                    {view?.type === 'training' && (
                        <div className="modal">
                            <h2>EVOLUÇÃO</h2>
                            <div className="option" onClick={() => { update({qi: p.qi + 7, happiness: -15}); setView(null); addLog("Sua mente expandiu, mas você está exausto."); }}>ESTUDAR (+QI)</div>
                            <div className="option" onClick={() => { update({strength: p.strength + 8, health: -5}); setView(null); addLog("Você aprendeu a bater onde dói."); }}>APRENDER LUTAR (+FORÇA)</div>
                            <div className="option" onClick={() => setView(null)}>FECHAR</div>
                        </div>
                    )}

                    {view?.type === 'night' && (
                        <div className="modal">
                            <h2>SUBMUNDO</h2>
                            <div className="option" onClick={() => { if(p.money >= 500) { update({money: -500, libido: -60, happiness: 50}); addLog("Noite selvagem com acompanhante."); setView(null); } else alert("Sem dinheiro!"); }}>ACOMPANHANTE (R$ 500)</div>
                            <div className="option" onClick={() => { update({happiness: 15}); setView(null); addLog("Você tentou falar com alguém, mas te acharam estranho."); }}>PROCURAR AMOR</div>
                            <div className="option" onClick={() => setView(null)}>FECHAR</div>
                        </div>
                    )}

                    {view?.type === 'event' && (
                        <div className="modal">
                            <h2 style={{color: 'var(--danger)'}}>{view.data.t}</h2>
                            <p style={{lineHeight:'1.5'}}>{view.data.d}</p>
                            {view.data.o.map((o, i) => (
                                <div key={i} className="option" onClick={() => { o.f(); setView(null); }}>{o.n}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

            });
            const [logs, setLogs] = useState([{ m: "Você nasceu. O brilho do sol é seu maior inimigo.", s: false }]);
            const [view, setView] = useState(null); // 'jobs', 'night', 'training', 'event'

            const addLog = (m, s = false) => setLogs(prev => [{ m, s }, ...prev]);

            const update = (obj) => {
                setP(prev => {
                    let next = { ...prev, ...obj };
                    ['skin', 'health', 'happiness', 'libido', 'qi', 'strength'].forEach(k => {
                        if(next[k] !== undefined) next[k] = Math.max(0, Math.min(100, next[k]));
                    });
                    return next;
                });
            };

            const ageUp = () => {
                if(p.dead) return;
                let newAge = p.age + 1;
                let salary = p.job === "Dev" ? 800 : p.job === "Vendedor" ? 200 : p.job === "CEO" ? 5000 : 0;
                
                update({ age: newAge, money: p.money + salary, skin: p.skin - 5, health: p.health - 2 });
                
                // IA de Eventos Sinistros
                if (Math.random() < 0.25) triggerSinisterEvent(newAge);
                if (p.skin <= 0 || p.health <= 0) { update({ dead: true }); addLog("💀 FIM DA LINHA.", true); }
            };

            const triggerSinisterEvent = (age) => {
                const events = [
                    { t: "Assalto Violento", d: "Um homem armado te parou no beco. Você mal consegue ver a arma dele.", o: [
                        { n: "Reagir (Usa Força)", f: () => p.strength > 40 ? addLog("Você o nocauteou!") : update({health: -50, money: -p.money}) },
                        { n: "Entregar tudo", f: () => update({money: 0, happiness: -20}) }
                    ]},
                    { t: "Seita Estranha", d: "Alguém disse que sua pele é 'sagrada' e tentou te levar para um carro.", o: [
                        { n: "Correr", f: () => update({health: -10}) },
                        { n: "Lutar", f: () => update({strength: 5, health: -20}) }
                    ]}
                ];
                setView({ type: 'event', data: events[Math.floor(Math.random()*events.length)] });
            };

            return (
                <div id="root">
                    <div className="header">
                        <div style={{display:'flex', justifyContent:'space-between'}}>
                            <span style={{color:var(--acc)}}>IDADE: {p.age}</span>
                            <span style={{color:'#10b981'}}>R$ {p.money}</span>
                        </div>
                        <div className="stats-grid">
                            <div className="stat-box">Pele <div className="bar"><div className="fill" style={{width:`${p.skin}%`, background:'#ef4444'}}></div></div></div>

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
