<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Albino Life: Instant Load</title>
    <style>
        :root { --bg: #000; --card: #111; --acc: #8b5cf6; --txt: #eee; --danger: #ff4e4e; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; }
        
        /* Header Fixo */
        .header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--acc); }
        .top { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-box { font-size: 10px; color: #888; }
        .bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .fill { height: 100%; width: 100%; transform-origin: left; transition: transform 0.3s; }

        /* Feed de Eventos */
        #logs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 8px; }
        .log { padding: 12px; border-radius: 10px; background: #111; border: 1px solid #222; font-size: 13px; animation: in 0.2s; }
        .sinister { border-color: var(--danger); background: #200; color: #fbb; }
        @keyframes in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Controles */
        .actions { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #000; }
        .btn { padding: 15px; border: 1px solid #333; background: #161616; color: #fff; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--acc); transform: scale(0.98); }
        .btn-age { grid-column: span 2; background: #fff; color: #000; font-size: 14px; }

        /* Modais */
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 10; padding: 30px; display: none; flex-direction: column; justify-content: center; }
        .opt { padding: 18px; border: 1px solid #444; margin-top: 10px; border-radius: 10px; background: #111; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="top">
            <span id="u-age">ANO: 0</span>
            <span id="u-cash" style="color:var(--success)">R$ 50</span>
        </div>
        <div class="stats">
            <div class="stat-box">PELE <div class="bar"><div id="b-skin" class="fill" style="background:var(--danger)"></div></div></div>
            <div class="stat-box">QI <div class="bar"><div id="b-qi" class="fill" style="background:#3b82f6; transform:scaleX(0.5)"></div></div></div>
            <div class="stat-box">FORÇA <div class="bar"><div id="b-str" class="fill" style="background:var(--acc); transform:scaleX(0.1)"></div></div></div>
        </div>
    </div>

    <div id="logs"></div>

    <div class="actions">
        <button class="btn" onclick="menu('jobs')">💼 CARREIRA</button>
        <button class="btn" onclick="menu('train')">🏋️ TREINAR</button>
        <button class="btn" onclick="menu('night')">🌃 NOITE</button>
        <button class="btn" onclick="buy()">🧴 PROTETOR</button>
        <button class="btn btn-age" onclick="age()">PRÓXIMO ANO</button>
    </div>

    <div id="m" class="modal">
        <h2 id="mt" style="color:var(--acc); margin-bottom:10px"></h2>
        <p id="md" style="margin-bottom:20px; font-size:14px; color:#aaa"></p>
        <div id="mo"></div>
        <button class="btn" style="margin-top:20px" onclick="closeM()">FECHAR</button>
    </div>
</div>

<script>
    // Sistema Lite - Sem carregamento externo
    let p = { age: 0, cash: 50, skin: 100, qi: 50, str: 10, job: "Nenhum", dead: false };

    function up() {
        document.getElementById('u-age').innerText = `ANO: ${p.age}`;
        document.getElementById('u-cash').innerText = `R$ ${p.cash}`;
        document.getElementById('b-skin').style.transform = `scaleX(${p.skin/100})`;
        document.getElementById('b-qi').style.transform = `scaleX(${p.qi/100})`;
        document.getElementById('b-str').style.transform = `scaleX(${p.str/100})`;
    }

    function log(m, s = false) {
        const l = document.getElementById('logs');
        const d = document.createElement('div');
        d.className = `log ${s ? 'sinister' : ''}`;
        d.innerHTML = `<strong>Ano ${p.age}:</strong> ${m}`;
        l.appendChild(d);
    }

    function age() {
        if(p.dead) return;
        p.age++;
        if(p.job === "Dev") p.cash += 1200;
        p.skin -= 10;
        if(Math.random() < 0.3) sinister();
        if(p.skin <= 0) { p.dead = true; log("O sol venceu. Seu corpo parou.", true); }
        up();
    }

    function buy() {
        if(p.cash >= 100) { p.cash -= 100; p.skin = 100; log("Pele protegida."); up(); }
    }

    function sinister() {
        const evs = [
            { t: "EMBOSCADA", d: "Alguém te seguiu até o beco.", o: [
                { n: "Lutar", a: () => p.str > 30 ? log("Você o nocauteou!") : (p.cash=0, log("Você foi roubado.", true)) },
                { n: "Correr", a: () => log("Você escapou.") }
            ]}
        ];
        const e = evs[0];
        showM(e.t, e.d, e.o);
    }

    function menu(type) {
        const opts = {
            jobs: { t: "EMPREGO", d: "Escolha sua área:", o: [
                { n: "Programador (QI 60)", a: () => p.qi >= 60 ? p.job = "Dev" : alert("QI baixo") },
                { n: "Mendingo", a: () => p.job = "Rua" }
            ]},
            train: { t: "TREINO", d: "O que melhorar?", o: [
                { n: "Estudar (+QI)", a: () => p.qi += 10 },
                { n: "Malhar (+Força)", a: () => p.str += 10 }
            ]},
            night: { t: "NOITE", d: "O submundo...", o: [
                { n: "Acompanhante (R$ 400)", a: () => p.cash >= 400 ? (p.cash -= 400, log("Noite de prazer.")) : alert("Sem grana") }
            ]}
        };
        showM(opts[type].t, opts[type].d, opts[type].o);
    }

    function showM(t, d, os) {
        document.getElementById('mt').innerText = t;
        document.getElementById('md').innerText = d;
        const c = document.getElementById('mo');
        c.innerHTML = '';
        os.forEach(o => {
            const b = document.createElement('div');
            b.className = 'opt';
            b.innerText = o.n;
            b.onclick = () => { o.a(); closeM(); up(); };
            c.appendChild(b);
        });
        document.getElementById('m').style.display = 'flex';
    }

    function closeM() { document.getElementById('m').style.display = 'none'; }

    log("A jornada começa.");
    up();
</script>
</body>
</html>
